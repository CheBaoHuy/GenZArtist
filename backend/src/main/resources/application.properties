spring.application.name=store
# Bật giao diện quản lý trên trình duyệt
spring.h2.console.enabled=true
# Đường dẫn để truy cập console (ví dụ: localhost:8080/h2-console)
spring.h2.console.path=/h2-console

# Kết nối MySQL (Thay đổi db_name, username, password của bạn)
spring.datasource.url=jdbc:mysql://localhost:3306/art_ecommerce_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Bỏ qua quá trình tự động detect metadata bằng cách khai báo rõ Dialect của MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Quan trọng: Tự động tạo bảng dựa trên các file @Entity của bạn
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Chỉ hiện những lỗi thực sự nghiêm trọng
logging.level.org.springframework.web=DEBUG
# Hiện cả câu lệnh SQL đang thực thi (rất tiện để debug database)
logging.level.org.hibernate.SQL=DEBUG